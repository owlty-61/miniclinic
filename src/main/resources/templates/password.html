<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 420px; margin: 80px auto; padding: 0 20px; }
        h1 { color: #0F2443; text-align: center; margin-bottom: 8px; }
        .field { margin: 16px 0; }
        label { display: block; font-weight: bold; color: #0F2443; margin-bottom: 6px; }
        input { width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; background: #14B8A6; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; margin-top: 12px; }
        button:hover { background: #0D9488; }
        .alert { background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h1>修改密碼</h1>
    <p style="text-align: center; color: #64748B; margin-bottom: 24px;">醫師：<span th:text="${loggedInDoctorName}"></span></p>

    <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/password}" th:object="${passwordForm}" method="post">
        <div class="field">
            <label>舊密碼</label>
            <input type="password" th:field="*{oldPassword}" required>
        </div>
        <div class="field">
            <label>新密碼</label>
            <input type="password" th:field="*{newPassword}" required>
        </div>
        <div class="field">
            <label>確認新密碼</label>
            <input type="password" th:field="*{confirmPassword}" required>
        </div>
        <button type="submit">確認修改</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a th:href="@{/dashboard}">← 返回 Dashboard</a>
    </p>
</body>
</html>
