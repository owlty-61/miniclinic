<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號統計 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        .stat-box { background: #F8FAFC; padding: 20px; border-left: 5px solid #14B8A6; margin-bottom: 20px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0F2443; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #E2E8F0; }
        tr:hover td { background: #F0FDFA; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/patients}">病歷資料</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計資訊</a>
        <a th:href="@{/login}">醫師登入</a>  
    </nav>
    
    <h1>掛號統計與分析</h1>

    <div class="stat-box">
        <h2>基本統計</h2>
        <p>醫師總數：<strong th:text="${doctorTotalCount}">0</strong> 人</p>
        <p>病患總數：<strong th:text="${patientTotalCount}">0</strong> 人</p>
        <p>總掛號數：<strong th:text="${appointmentTotalCount}">0</strong> 筆</p>
    </div>

    <div class="stat-box">
        <h2>各科別掛號數</h2>
        <table>
            <thead>
                <tr>
                    <th>科別</th>
                    <th>掛號數量</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="stat : ${deptStats}">
                    <td th:text="${stat[0]}">內科</td>
                    <td th:text="${stat[1]}">0</td>
                </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(deptStats)}">目前尚無掛號資料</p>
    </div>
</body>
</html>
